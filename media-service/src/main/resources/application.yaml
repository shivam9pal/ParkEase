server:
  port: 8089

spring:
  application:
    name: media-service

  datasource:
    url: jdbc:postgresql://localhost:5432/parkease_media
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  web:
    cors:
      allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:5175"
      allowed-methods: "GET,POST,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

jwt:
  secret: ${JWT_SECRET}
  expiry: 86400000

aws:
  s3:
    bucket: parkease-assets
    region: ap-south-1
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

media:
  upload:
    max-file-size: 10485760  # 10 MB in bytes
    allowed-types: image/jpeg,image/png,image/webp,application/pdf
    temp-dir: ${TEMP_DIR:./temp}
